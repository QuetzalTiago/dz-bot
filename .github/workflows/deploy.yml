name: Deploy

on:
  push:
    branches:
      - main
  pull_request:

env:
  AWS_REGION: us-east-1
  APP_NAME: bot-app
  DEPLOY_GROUP: bot-deploy-group

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Run tests with coverage
        # Ratchet floor: raise COV_FAIL_UNDER whenever coverage improves,
        # but never past what's actually achieved. Target is 80%; this
        # only blocks regressions below the last known-good level.
        env:
          COV_FAIL_UNDER: 65
        run: |
          pytest -q --cov=cogs --cov=bot --cov-report=term-missing \
            --cov-fail-under=$COV_FAIL_UNDER

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - run: |
          commit_hash=`git rev-parse HEAD`
          aws deploy create-deployment --application-name ${{ env.APP_NAME }} --deployment-group-name ${{ env.DEPLOY_GROUP }} --github-location repository=$GITHUB_REPOSITORY,commitId=$commit_hash --ignore-application-stop-failures
